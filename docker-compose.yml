services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started
      strfry:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-relaypress}
      POSTGRES_USER: ${POSTGRES_USER:-relaypress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  strfry:
    image: dockurr/strfry:latest
    restart: unless-stopped
    volumes:
      - strfry_data:/app/strfry-db
      - ./infra/relay/strfry.conf:/etc/strfry.conf:ro
    command: ["strfry", "relay", "/etc/strfry.conf"]
    stop_grace_period: 2m

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_TICK_INTERVAL_MS: ${WORKER_TICK_INTERVAL_MS:-30000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      strfry:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  strfry_data:
