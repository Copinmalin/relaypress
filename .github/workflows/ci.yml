name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure lockfile exists
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml is missing. Run the 'Generate pnpm lockfile' workflow or run 'pnpm install --lockfile-only' locally and commit the result."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Prepare compose environment
        run: cp .env.example .env

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build api worker
